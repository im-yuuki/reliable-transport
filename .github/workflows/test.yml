name: Automated Tests

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        test-path: [RTP-base, RTP-opt]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      
      - name: Create virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Activate venv
        run: echo "VIRTUAL_ENV=$(pwd)/.venv" >> $GITHUB_ENV && echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
      
      - name: Make test script executable
        run: chmod +x ./test_scripts/test.sh ./test_scripts/compare.sh
      
      - name: Run tests for ${{ matrix.test-path }}
        run: |
          bash ./test_scripts/test.sh ${{ matrix.test-path }} | tee test-${{ matrix.test-path }}.log
        continue-on-error: false
      
      - name: Check test results for ${{ matrix.test-path }}
        run: |
          if grep -q "SUCCESS:" test-${{ matrix.test-path }}.log; then
            echo "✅ Tests passed for ${{ matrix.test-path }}"
          else
            echo "❌ Tests failed for ${{ matrix.test-path }}"
            exit 1
          fi
      
      - name: Upload output files
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-${{ matrix.test-path }}
          path: ${{ matrix.test-path }}/output.txt
